name = "oidc-relay"
compatibility_date = "2024-09-23"
workers_dev = true
send_metrics = false

main = "src/relay.ts"

[[durable_objects.bindings]]
name = "OIDC_RELAY"
class_name = "OidcHandoff"

[[durable_objects.bindings]]
name = "LOGIN_SESSION"
class_name = "LoginSession"

[[migrations]]
tag = "v1"
new_classes = ["OidcHandoff"]

[[migrations]]
tag = "v2"
new_classes = ["LoginSession"]

# Staging: a workers.dev URL is fine to start; swap to a custom domain for prod.
[env.staging]
name = "oidc-relay-staging"
workers_dev = true

[[env.staging.durable_objects.bindings]]
name = "OIDC_RELAY"
class_name = "OidcHandoff"

[[env.staging.durable_objects.bindings]]
name = "LOGIN_SESSION"
class_name = "LoginSession"

[[env.staging.migrations]]
tag = "v1"
new_classes = ["OidcHandoff"]

[[env.staging.migrations]]
tag = "v2"
new_classes = ["LoginSession"]

[env.production]
name = "oidc-relay-production"
workers_dev = false
# Custom domain provisioned by wrangler on deploy (polygon.technology zone must be
# on this Cloudflare account). Sequence must allowlist this /api/oidc/cb as a
# redirect target on their relay (Google only ever sees Sequence's relay, so no
# Google-client change is needed).
routes = [{ pattern = "oidc-relay.polygon.technology", custom_domain = true }]

[[env.production.durable_objects.bindings]]
name = "OIDC_RELAY"
class_name = "OidcHandoff"

[[env.production.durable_objects.bindings]]
name = "LOGIN_SESSION"
class_name = "LoginSession"

[[env.production.migrations]]
tag = "v1"
new_classes = ["OidcHandoff"]

[[env.production.migrations]]
tag = "v2"
new_classes = ["LoginSession"]
