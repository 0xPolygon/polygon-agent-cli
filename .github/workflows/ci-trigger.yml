name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI - lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: 0xPolygon/pipelines/.github/actions/ci@main
      # The shared `ci` action covers lint/typecheck/test. `build` is added
      # here because agentconnect-ui's Vite build is only otherwise exercised by
      # `deploy-agentconnect-ui.yml` on push to `main` — without this step a
      # broken bundle would land on `main` before the production deploy
      # surfaces it. The CLI's esbuild bundle is also validated here rather
      # than waiting for `prepublishOnly` at release time.
      #
      # Gated to match the shared `ci` action, which skips every step (pnpm
      # setup included) on `changeset-release/*` branches. Those branches carry
      # only version bumps and changelog edits, so there is nothing to build,
      # and without this guard the step runs with no pnpm on PATH and fails
      # with "pnpm: command not found".
      - if: "!startsWith(github.head_ref, 'changeset-release/')"
        run: pnpm run --if-present build
        shell: bash
